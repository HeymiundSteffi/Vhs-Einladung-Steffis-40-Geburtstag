<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steffis 40. Geburtstag</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ==========================================
         VHS Intro
    =========================================== -->

    <section id="intro">

        <img id="background" src="bilder/startseite.png" alt="Steffis 40. Geburtstag">

        <div id="tv">

            <div id="noise"></div>

            <div id="tracking"></div>

            <div id="video">

                <div id="play">▶ PLAY</div>

                <div id="slideshow">
                    <img id="slide" src="" alt="Erinnerungen">
                </div>

                <div id="title">
                    <h1></h1>
                    <p></p>
                </div>

            </div>

        </div>

    </section>

    <!-- ==========================================
         Begrüßung
    =========================================== -->

    <section id="welcome">

        <div class="welcome-overlay">

            <h2>Ihr habt die Kassette eingelegt, ihr seid eingeladen!</h2>

            <p>
                Schön das ihr da seit!
            </p>

            <p>
                Am <strong>22. Dezember 2026</strong> möchte ich gemeinsam mit euch
                meinen 40. Geburtstag feiern.
            </p>

            <p>
                Ich freue mich riesig darauf, diesen besonderen Tag mit euch
                zu verbringen und hoffe, ihr seid dabei!
            </p>

            <button id="startInvitation">
                Zur Einladung
            </button>

        </div>

    </section>

    <script src="js/script.js"></script>

</body>

</html>
